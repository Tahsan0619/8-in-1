<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — BazarBD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="product">
  <a href="#main" class="skip-nav">Skip to main content</a>

  <header class="header">
    <div class="container">
      <a href="index.html" class="header-logo"><svg viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="6" fill="currentColor" opacity=".15"/><path d="M7 8h14M7 14h14M7 20h10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg> BazarBD</a>
      <div class="header-search">
        <select><option>All</option><option>Fashion</option><option>Electronics</option><option>Home</option><option>Books</option></select>
        <input type="text" placeholder="Search products...">
        <button aria-label="Search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></button>
      </div>
      <div class="header-nav"><a href="browse.html">Browse</a><a href="sell.html">Sell</a></div>
      <div class="header-actions">
        <a href="cart.html" class="cart-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg><span class="cart-badge" style="display:none">0</span></a>
        <button class="theme-toggle" aria-label="Toggle theme"><svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg><svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
        <button class="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
      </div>
    </div>
  </header>

  <div class="drawer-overlay"></div>
  <div class="drawer"><button class="drawer-close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button><nav class="drawer-nav"><a href="index.html">Home</a><a href="browse.html">Browse</a><a href="cart.html">Cart</a><a href="order.html">Orders</a></nav></div>

  <main id="main">
    <section class="section">
      <div class="container">
        <div class="breadcrumb" id="breadcrumb"></div>
        <div class="product-detail">
          <div class="product-gallery" id="gallery"></div>
          <div class="product-info" id="productInfo"></div>
        </div>

        <div class="seller-strip" id="sellerStrip"></div>

        <div class="tabs">
          <button class="tab-btn active" data-tab="tabDescription">Description</button>
          <button class="tab-btn" data-tab="tabSpecs">Specifications</button>
          <button class="tab-btn" data-tab="tabReviews">Reviews</button>
        </div>
        <div class="tab-content active" id="tabDescription"></div>
        <div class="tab-content" id="tabSpecs"></div>
        <div class="tab-content" id="tabReviews"></div>

        <div style="margin-top:var(--sp-12)">
          <h2 class="section-title" style="margin-bottom:var(--sp-6)">You May Also Like</h2>
          <div class="product-grid" id="relatedProducts"></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-grid">
        <div class="footer-col"><h4>About BazarBD</h4><p>Bangladesh's largest multi-vendor marketplace.</p></div>
        <div class="footer-col"><h4>Sell With Us</h4><ul class="footer-links"><li><a href="sell.html">Start Selling</a></li></ul></div>
        <div class="footer-col"><h4>Help</h4><ul class="footer-links"><li><a href="order.html">Track Order</a></li></ul></div>
        <div class="footer-col"><h4>Payments</h4><div class="footer-payments">💳 bKash · Nagad · Visa · COD</div></div>
      </div>
      <div class="footer-bottom"><p>&copy; 2026 BazarBD</p></div>
    </div>
  </footer>

  <button class="back-to-top" aria-label="Back to top"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 15l-6-6-6 6"/></svg></button>
  <script src="js/data.js" defer></script>
  <script src="js/app.js" defer></script>
</body>
</html>
