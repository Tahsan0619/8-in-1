<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — FLAVR</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/data.js" defer></script>
  <script src="js/app.js" defer></script>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <button class="menu-toggle" onclick="MobileDrawer.open()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg></button>
      <a href="index.html" class="header-logo">FLAV<span>R</span></a>
      <div class="header-search">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="searchInput" placeholder="Search products..." autocomplete="off">
        <div class="search-dropdown" id="searchDropdown"></div>
      </div>
      <div class="header-actions">
        <button class="header-action-btn" onclick="Theme.toggle()" title="Toggle theme"><span class="theme-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span></button>
        <a href="account.html" class="header-action-btn" title="Account"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></a>
        <button class="header-action-btn" onclick="Cart.open()" title="Cart"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg><span class="cart-badge"></span></button>
      </div>
    </div>
  </header>

  <!-- MOBILE DRAWER -->
  <div class="drawer-overlay" id="drawerOverlay"></div>
  <aside class="mobile-drawer" id="mobileDrawer">
    <div class="mobile-drawer-header"><span class="header-logo">FLAV<span>R</span></span><button class="mobile-drawer-close" onclick="MobileDrawer.close()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button></div>
    <nav class="mobile-drawer-nav"><a href="shop.html" class="mobile-nav-item">All Products</a><a href="account.html" class="mobile-nav-item">My Account</a><a href="admin.html" class="mobile-nav-item">Admin Panel</a></nav>
    <div class="mobile-drawer-footer"><button class="mobile-theme-toggle" onclick="Theme.toggle()"><span class="theme-label">Dark Mode</span><span class="theme-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span></button></div>
  </aside>

  <!-- MAIN -->
  <main>
    <div class="container">
      <nav class="breadcrumb" id="breadcrumb"></nav>
      <div class="product-detail" id="productDetail"></div>
    </div>

    <!-- Tabs -->
    <div class="product-tabs">
      <div class="container">
        <div class="tabs-nav" id="tabsNav">
          <button class="tab-btn active" data-tab="description">Description</button>
          <button class="tab-btn" data-tab="specs">Specifications</button>
          <button class="tab-btn" data-tab="reviews">Reviews</button>
        </div>
        <div class="tab-content active" id="tab-description"></div>
        <div class="tab-content" id="tab-specs"></div>
        <div class="tab-content" id="tab-reviews"></div>
      </div>
    </div>

    <!-- Related Products -->
    <section class="section">
      <div class="container">
        <div class="section-header">
          <h2>You May Also Like</h2>
          <a href="shop.html" class="view-all">View All <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="m9 18 6-6-6-6"/></svg></a>
        </div>
        <div class="product-grid" id="relatedProducts"></div>
      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <div class="footer-grid">
        <div class="footer-brand"><a href="index.html" class="header-logo">FLAV<span>R</span></a><p>Curated lifestyle essentials for the modern individual.</p></div>
        <div class="footer-col"><h4>Shop</h4><a href="shop.html?cat=men">Men</a><a href="shop.html?cat=women">Women</a><a href="shop.html?cat=electronics">Electronics</a></div>
        <div class="footer-col"><h4>Company</h4><a href="#">About Us</a><a href="#">Blog</a><a href="#">Contact</a></div>
        <div class="footer-col"><h4>Support</h4><a href="#">Help Center</a><a href="#">Shipping</a><a href="#">Returns</a></div>
      </div>
      <div class="footer-bottom"><p>&copy; 2025 FLAVR. All rights reserved.</p></div>
    </div>
  </footer>

  <!-- CART DRAWER -->
  <aside class="cart-drawer" id="cartDrawer">
    <div class="cart-drawer-header"><h3>Shopping Cart</h3><button class="cart-drawer-close" onclick="Cart.close()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button></div>
    <div class="cart-drawer-body"></div>
    <div class="cart-coupon"></div>
    <div class="cart-drawer-footer"></div>
  </aside>

  <button class="scroll-top"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="m18 15-6-6-6 6"/></svg></button>

  <script>
    let currentProduct = null;
    let selectedColor = null;
    let selectedSize = null;
    let qty = 1;

    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const pid = parseInt(params.get('id')) || 1;
      currentProduct = STORE.products.find(p => p.id === pid);

      if (!currentProduct) {
        document.getElementById('productDetail').innerHTML = '<div class="empty-state" style="grid-column:1/-1"><h3>Product not found</h3><a href="shop.html" class="btn btn--primary btn--md">Back to Shop</a></div>';
        return;
      }

      document.title = `${currentProduct.name} — FLAVR`;
      selectedColor = currentProduct.colors[0]?.name;
      selectedSize = currentProduct.sizes[0];
      renderBreadcrumb();
      renderProduct();
      renderTabs();
      renderRelated();
      initTabs();
    });

    function renderBreadcrumb() {
      document.getElementById('breadcrumb').innerHTML = `
        <a href="index.html">Home</a><span class="sep">/</span>
        <a href="shop.html">Shop</a><span class="sep">/</span>
        <a href="shop.html?cat=${currentProduct.category.toLowerCase()}">${currentProduct.category}</a><span class="sep">/</span>
        <span class="current">${currentProduct.name}</span>
      `;
    }

    function renderProduct() {
      const p = currentProduct;
      const discount = p.originalPrice ? Math.round((1 - p.price / p.originalPrice) * 100) : 0;
      const stockClass = p.stock > 10 ? 'in' : p.stock > 0 ? 'low' : 'out';
      const stockText = p.stock > 10 ? 'In Stock' : p.stock > 0 ? `Only ${p.stock} left` : 'Out of Stock';

      document.getElementById('productDetail').innerHTML = `
        <!-- Gallery -->
        <div class="gallery">
          <div class="gallery-main" onclick="Lightbox.open(this.querySelector('img').src)">
            <img src="${p.images[0]}" alt="${p.name}" id="mainImage">
          </div>
          <div class="gallery-thumbs">
            ${p.images.map((img, i) => `
              <div class="gallery-thumb ${i === 0 ? 'active' : ''}" onclick="changeImage(${i}, this)">
                <img src="${img}" alt="${p.name} ${i + 1}">
              </div>
            `).join('')}
          </div>
        </div>

        <!-- Info -->
        <div class="product-info">
          <h1 class="product-info-title">${p.name}</h1>
          <div class="product-info-rating">
            <div class="stars" style="color:#F59E0B">${starsHTML(p.rating, 18)}</div>
            <a href="#reviews" onclick="switchTab('reviews')">${p.rating} · ${p.reviews} reviews</a>
            <span style="color:var(--color-text-muted); margin-left:8px">${p.sold} sold</span>
          </div>
          <div class="product-info-price">
            <span class="price-current">${STORE.currency}${p.price.toLocaleString()}</span>
            ${p.originalPrice ? `<span class="price-original">${STORE.currency}${p.originalPrice.toLocaleString()}</span><span class="discount-badge">-${discount}%</span>` : ''}
          </div>
          <div class="product-variants">
            ${p.colors.length > 1 || p.colors[0]?.name !== p.sizes[0] ? `
            <div class="variant-group">
              <div class="variant-label">Color: <span id="selectedColorLabel">${selectedColor}</span></div>
              <div class="color-swatches">
                ${p.colors.map((c, i) => `
                  <button class="color-swatch ${i === 0 ? 'active' : ''}" style="background:${c.hex}${c.hex === '#FFFFFF' ? ';border:1px solid var(--color-border)' : ''}" data-color="${c.name}" onclick="selectColor('${c.name}', this)" title="${c.name}"></button>
                `).join('')}
              </div>
            </div>` : ''}
            ${p.sizes.length > 1 || p.sizes[0] !== 'One Size' ? `
            <div class="variant-group">
              <div class="variant-label">Size: <span id="selectedSizeLabel">${selectedSize}</span></div>
              <div class="size-pills">
                ${p.sizes.map((s, i) => `
                  <button class="size-pill ${i === 0 ? 'active' : ''}" data-size="${s}" onclick="selectSize('${s}', this)">${s}</button>
                `).join('')}
              </div>
            </div>` : ''}
          </div>

          <div class="stock-indicator">
            <span class="stock-dot stock-dot--${stockClass}"></span>
            <span class="stock-text--${stockClass}">${stockText}</span>
          </div>

          <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
            <div class="qty-stepper">
              <button onclick="updateQty(-1)">−</button>
              <span class="qty-value" id="qtyDisplay">${qty}</span>
              <button onclick="updateQty(1)">+</button>
            </div>
          </div>

          <div class="product-actions">
            <button class="btn btn--primary btn--lg" onclick="addToCart()" ${p.stock === 0 ? 'disabled' : ''}>Add to Cart</button>
            <button class="btn btn--accent btn--lg" onclick="buyNow()" ${p.stock === 0 ? 'disabled' : ''}>Buy Now</button>
            <button class="wishlist-btn ${Wishlist.has(p.id) ? 'active' : ''}" data-wishlist="${p.id}" onclick="Wishlist.toggle(${p.id})">
              ${Wishlist.has(p.id) ? Icons.heartFill : Icons.heart}
            </button>
          </div>

          <div class="product-promises">
            <div class="promise-item">${Icons.truck} Free shipping on orders above ৳2,000</div>
            <div class="promise-item">${Icons.refresh} 7-day easy returns</div>
            <div class="promise-item">${Icons.shield} 100% authentic products</div>
          </div>
        </div>
      `;
    }

    function changeImage(index, thumb) {
      document.getElementById('mainImage').src = currentProduct.images[index];
      document.querySelectorAll('.gallery-thumb').forEach((t, i) => t.classList.toggle('active', i === index));
    }

    function selectColor(color, btn) {
      selectedColor = color;
      document.getElementById('selectedColorLabel').textContent = color;
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
      btn.classList.add('active');
    }

    function selectSize(size, btn) {
      selectedSize = size;
      document.getElementById('selectedSizeLabel').textContent = size;
      document.querySelectorAll('.size-pill').forEach(s => s.classList.remove('active'));
      btn.classList.add('active');
    }

    function updateQty(delta) {
      qty = Math.max(1, Math.min(qty + delta, currentProduct.stock));
      document.getElementById('qtyDisplay').textContent = qty;
    }

    function addToCart() {
      Cart.add(currentProduct.id, qty, selectedColor, selectedSize);
    }

    function buyNow() {
      Cart.add(currentProduct.id, qty, selectedColor, selectedSize);
      window.location.href = 'checkout.html';
    }

    function renderTabs() {
      // Description
      document.getElementById('tab-description').innerHTML = `
        <div class="tab-description">
          <p>${currentProduct.description}</p>
          <h3>Features</h3>
          <ul>
            ${Object.entries(currentProduct.specs).map(([k, v]) => `<li><strong>${k}:</strong> ${v}</li>`).join('')}
          </ul>
        </div>
      `;
      // Specs
      document.getElementById('tab-specs').innerHTML = `
        <table class="specs-table">
          <tbody>
            ${Object.entries(currentProduct.specs).map(([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('')}
          </tbody>
        </table>
      `;
      // Reviews
      const avgRating = currentProduct.rating;
      const totalReviews = currentProduct.reviews;
      const bars = [5, 4, 3, 2, 1].map(star => {
        const count = STORE.reviews.filter(r => r.rating === star).length;
        const pct = totalReviews > 0 ? Math.round((count / STORE.reviews.length) * 100) : 0;
        return { star, count, pct };
      });

      document.getElementById('tab-reviews').innerHTML = `
        <div class="reviews-summary">
          <div class="reviews-average">
            <div class="big-rating">${avgRating}</div>
            <div class="stars" style="color:#F59E0B">${starsHTML(avgRating, 20)}</div>
            <p>${totalReviews} reviews</p>
          </div>
          <div class="rating-bars">
            ${bars.map(b => `
              <div class="rating-bar-row">
                <span>${b.star}</span>
                <div class="rating-bar"><div class="rating-bar-fill" style="width:${b.pct}%"></div></div>
                <span>${b.count}</span>
              </div>
            `).join('')}
          </div>
        </div>
        <div>
          <button class="btn btn--secondary btn--md" onclick="Toast.show('Review submitted! (Demo)', 'success')" style="margin-bottom:24px">✍️ Write a Review</button>
        </div>
        <div class="reviews-list">
          ${STORE.reviews.map(r => `
            <div class="review-card">
              <div class="review-header">
                <div class="review-avatar">${r.avatar}</div>
                <div class="review-meta">
                  <div class="name">${r.user}</div>
                  <div class="date">${r.date}</div>
                </div>
                <div class="stars" style="color:#F59E0B">${starsHTML(r.rating, 14)}</div>
              </div>
              <div class="review-body">${r.text}</div>
              <div class="review-helpful">
                <button onclick="Toast.show('Thanks for your feedback!','success')">👍 Helpful (${r.helpful})</button>
                <button onclick="Toast.show('Reported','info')">🚩 Report</button>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function initTabs() {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => switchTab(btn.dataset.tab));
      });
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === `tab-${tab}`));
    }

    function renderRelated() {
      const related = STORE.products
        .filter(p => p.category === currentProduct.category && p.id !== currentProduct.id)
        .slice(0, 4);
      if (related.length === 0) {
        // Fill with random products
        const others = STORE.products.filter(p => p.id !== currentProduct.id).slice(0, 4);
        document.getElementById('relatedProducts').innerHTML = others.map(p => productCardHTML(p)).join('');
      } else {
        document.getElementById('relatedProducts').innerHTML = related.map(p => productCardHTML(p)).join('');
      }
    }
  </script>
</body>
</html>
