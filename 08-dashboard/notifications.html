<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Notifications — NexGen Labs</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔔</text></svg>">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="logo-icon">N</div><span>NexGen Labs</span></div>
    <nav class="sidebar-nav">
      <div class="sidebar-section"><div class="sidebar-section-label">Main</div>
        <a href="index.html" class="nav-item"><span class="nav-icon">📊</span><span>Dashboard</span></a>
        <a href="tables.html" class="nav-item"><span class="nav-icon">📋</span><span>Data Tables</span></a>
      </div>
      <div class="sidebar-section"><div class="sidebar-section-label">CRM</div>
        <a href="contacts.html" class="nav-item"><span class="nav-icon">👤</span><span>Contacts</span></a>
        <a href="pipeline.html" class="nav-item"><span class="nav-icon">🔀</span><span>Pipeline</span></a>
      </div>
      <div class="sidebar-section"><div class="sidebar-section-label">Finance</div>
        <a href="finance.html" class="nav-item"><span class="nav-icon">💰</span><span>Overview</span></a>
        <a href="invoices.html" class="nav-item"><span class="nav-icon">🧾</span><span>Invoices</span></a>
      </div>
      <div class="sidebar-section"><div class="sidebar-section-label">Analytics</div>
        <a href="analytics.html" class="nav-item"><span class="nav-icon">📈</span><span>Analytics</span></a>
      </div>
      <div class="sidebar-section">
        <a href="settings.html" class="nav-item"><span class="nav-icon">⚙️</span><span>Settings</span></a>
        <a href="notifications.html" class="nav-item active"><span class="nav-icon">🔔</span><span>Notifications</span><span class="nav-badge">3</span></a>
        <a href="team.html" class="nav-item"><span class="nav-icon">👥</span><span>Team</span></a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user"><div class="user-av">TA</div><div class="user-info"><div class="user-name">Tahsan Islam</div><div class="user-org">NexGen Labs</div></div></div>
      <button class="sidebar-collapse-btn"><span class="nav-icon">◀</span><span>Collapse</span></button>
    </div>
  </aside>
  <div class="sidebar-overlay"></div>

  <div class="main-wrap">
    <header class="header">
      <button class="header-hamburger">☰</button>
      <div class="breadcrumb"><a href="index.html">Dashboard</a><span class="sep">/</span><span class="current">Notifications</span></div>
      <div class="header-spacer"></div>
      <div class="header-search"><span>🔍</span><span>Search...</span><kbd>Ctrl+K</kbd></div>
      <div class="header-actions">
        <button class="header-btn theme-toggle-btn">🌙</button>
        <div class="header-notif-btn" style="position:relative">
          <button class="header-btn">🔔<span class="badge"></span></button>
          <div class="notif-mini-dropdown" style="position:absolute;right:0;top:100%;margin-top:8px;width:320px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-md);box-shadow:var(--shadow-lg);z-index:60;display:none;overflow:hidden">
            <div style="padding:12px 16px;border-bottom:1px solid var(--border);font-weight:600;font-size:13px">Notifications</div>
            <div class="notif-mini-list" style="max-height:240px;overflow-y:auto"></div>
            <a href="notifications.html" style="display:block;padding:10px;text-align:center;font-size:12px;color:var(--accent);border-top:1px solid var(--border)">View all</a>
          </div>
        </div>
        <div class="header-user"><div class="av">TA</div></div>
      </div>
    </header>

    <main class="content">
      <div class="page-header">
        <h1>Notifications</h1>
        <button class="btn btn-secondary" id="markAllRead">Mark All as Read</button>
      </div>

      <div class="notif-list" id="notifList"></div>
    </main>
  </div>
</div>

<div class="cmd-overlay"><div class="cmd-modal"><div class="cmd-input"><span>🔍</span><input type="text" placeholder="Type a command or search..."><kbd>ESC</kbd></div><div class="cmd-results"></div></div></div>

<script src="js/data.js"></script><script src="js/app.js"></script>
<style>
.notif-mini-dropdown.active{display:block!important}
.notif-mini-item{display:flex;gap:10px;padding:10px 16px;font-size:12px;border-bottom:1px solid var(--border)}
.notif-mini-item.unread{background:var(--accent-muted)}
.notif-mini-item .n-title{font-weight:500}
.notif-mini-item .n-time{color:var(--text-tertiary);font-size:11px}
.notif-list{display:flex;flex-direction:column;gap:4px}
.notif-group-label{font-size:12px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.05em;padding:12px 0 8px}
.notif-item{display:flex;gap:14px;align-items:flex-start;padding:14px 16px;border-radius:var(--radius-md);border:1px solid var(--border);background:var(--bg-secondary);transition:all .15s;cursor:pointer}
.notif-item:hover{background:var(--bg-tertiary)}
.notif-item.unread{border-left:3px solid var(--accent);background:var(--accent-muted)}
.notif-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.notif-icon.billing{background:rgba(34,197,94,.15)}.notif-icon.team{background:rgba(59,130,246,.15)}.notif-icon.security{background:rgba(239,68,68,.15)}.notif-icon.system{background:rgba(168,85,247,.15)}.notif-icon.integration{background:rgba(245,158,11,.15)}
.notif-body{flex:1;min-width:0}
.notif-title{font-size:13px;font-weight:500;margin-bottom:4px}
.notif-desc{font-size:12px;color:var(--text-secondary);margin-bottom:6px}
.notif-time{font-size:11px;color:var(--text-tertiary)}
.notif-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:6px}
.btn{padding:8px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.btn-secondary{background:var(--bg-secondary);color:var(--text-primary)}
.btn-secondary:hover{background:var(--bg-tertiary)}
</style>
</body>
</html>
