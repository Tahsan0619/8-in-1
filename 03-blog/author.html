<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Author — The Inkwell</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/data.js" defer></script>
  <script src="js/app.js" defer></script>
</head>
<body>
  <header class="header"><div class="header-inner">
    <button class="menu-toggle" onclick="MobileMenu.open()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg></button>
    <a href="index.html" class="header-logo">The Ink<span>well</span></a>
    <nav class="header-nav"><a href="index.html">Home</a><a href="magazine.html">Magazine</a><a href="podcast.html">Podcast</a><a href="archive.html">Archive</a></nav>
    <div class="header-actions"><button class="theme-btn" onclick="Theme.toggle()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button></div>
  </div></header>
  <div class="mobile-overlay" id="mobileOverlay"></div>
  <aside class="mobile-menu" id="mobileMenu"><div class="mobile-menu-header"><span class="header-logo">The Ink<span>well</span></span><button onclick="MobileMenu.close()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button></div><nav class="mobile-menu-nav"><a href="index.html">Home</a><a href="magazine.html">Magazine</a><a href="podcast.html">Podcast</a><a href="archive.html">Archive</a></nav></aside>

  <div class="author-hero" id="authorHero"></div>

  <main class="container section">
    <h2 style="margin-bottom:24px;font-family:var(--font-display);font-size:28px" id="authorPostsTitle">Articles</h2>
    <div class="post-grid" id="authorPostGrid"></div>
  </main>

  <footer class="footer"><div class="container"><div class="footer-grid"><div class="footer-brand"><a href="index.html" class="header-logo" style="color:#fff">The Ink<span>well</span></a><p>Thoughtful writing about technology, design, culture, and the human experience.</p></div><div class="footer-col"><h4>Pages</h4><a href="magazine.html">Magazine</a><a href="podcast.html">Podcast</a><a href="archive.html">Archive</a></div><div class="footer-col"><h4>Connect</h4><a href="#">Twitter</a><a href="#">RSS</a></div></div><div class="footer-bottom"><p>&copy; 2025 The Inkwell</p></div></div></footer>
  <button class="scroll-top"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="m18 15-6-6-6 6"/></svg></button>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const authorId = params.get('id') || 'sarah-chen';
      const author = getAuthor(authorId);
      if (!author) return;

      document.title = `${author.name} — The Inkwell`;

      const socials = Object.entries(author.socials || {}).map(([k,v]) => `<a href="${v}" class="author-social" target="_blank" rel="noopener">${k.charAt(0).toUpperCase()+k.slice(1)}</a>`).join('');

      document.getElementById('authorHero').innerHTML = `
        <div class="container" style="text-align:center">
          <img src="${author.avatar}" alt="${author.name}" style="width:96px;height:96px;border-radius:50%;object-fit:cover;margin-bottom:16px;border:3px solid var(--color-accent)">
          <h1>${author.name}</h1>
          <p style="color:var(--color-accent);font-size:14px;font-weight:600;margin-bottom:8px">${author.role}</p>
          <p style="max-width:540px;margin:0 auto 16px;color:var(--color-text-secondary);line-height:1.6">${author.bio}</p>
          <div class="author-stats" style="display:flex;gap:32px;justify-content:center;margin-bottom:16px">
            <div><strong>${author.articles}</strong><span style="display:block;font-size:12px;color:var(--color-text-muted)">Articles</span></div>
            <div><strong>${author.totalReads}</strong><span style="display:block;font-size:12px;color:var(--color-text-muted)">Total Reads</span></div>
          </div>
          <div style="display:flex;gap:8px;justify-content:center">${socials}</div>
        </div>`;

      const posts = BLOG.posts.filter(p => p.author === authorId);
      document.getElementById('authorPostsTitle').textContent = `Articles by ${author.name} (${posts.length})`;
      document.getElementById('authorPostGrid').innerHTML = posts.length
        ? posts.map(p => postCardHTML(p)).join('')
        : '<p style="color:var(--color-text-secondary);padding:40px 0">No articles yet.</p>';
    });
  </script>
</body>
</html>
