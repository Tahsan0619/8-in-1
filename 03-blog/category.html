<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Category — The Inkwell</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/data.js" defer></script>
  <script src="js/app.js" defer></script>
</head>
<body>
  <header class="header"><div class="header-inner">
    <button class="menu-toggle" onclick="MobileMenu.open()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg></button>
    <a href="index.html" class="header-logo">The Ink<span>well</span></a>
    <nav class="header-nav"><a href="index.html">Home</a><a href="magazine.html">Magazine</a><a href="podcast.html">Podcast</a><a href="archive.html">Archive</a></nav>
    <div class="header-actions"><button class="theme-btn" onclick="Theme.toggle()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button></div>
  </div></header>
  <div class="mobile-overlay" id="mobileOverlay"></div>
  <aside class="mobile-menu" id="mobileMenu"><div class="mobile-menu-header"><span class="header-logo">The Ink<span>well</span></span><button onclick="MobileMenu.close()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button></div><nav class="mobile-menu-nav"><a href="index.html">Home</a><a href="magazine.html">Magazine</a><a href="podcast.html">Podcast</a><a href="archive.html">Archive</a></nav></aside>

  <div class="category-hero" id="catHero"></div>

  <main class="container section">
    <div class="blog-layout">
      <div class="blog-main">
        <div class="post-grid" id="catPostGrid"></div>
      </div>
      <aside class="sidebar">
        <div class="sidebar-widget"><h4>All Categories</h4><div id="allCats"></div></div>
      </aside>
    </div>
  </main>

  <footer class="footer"><div class="container"><div class="footer-grid"><div class="footer-brand"><a href="index.html" class="header-logo" style="color:#fff">The Ink<span>well</span></a><p>Thoughtful writing about technology, design, culture, and the human experience.</p></div><div class="footer-col"><h4>Pages</h4><a href="magazine.html">Magazine</a><a href="podcast.html">Podcast</a><a href="archive.html">Archive</a></div><div class="footer-col"><h4>Connect</h4><a href="#">Twitter</a><a href="#">RSS</a></div></div><div class="footer-bottom"><p>&copy; 2025 The Inkwell</p></div></div></footer>
  <button class="scroll-top"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="m18 15-6-6-6 6"/></svg></button>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const catSlug = params.get('cat') || 'technology';
      const cat = BLOG.categories.find(c => c.slug === catSlug);

      if (cat) {
        document.title = `${cat.name} — The Inkwell`;
        document.getElementById('catHero').innerHTML = `<div class="container"><span class="cat-badge ${getCatClass(catSlug)}" style="margin-bottom:12px">${cat.name}</span><h1>${cat.name}</h1><p>${cat.description}</p><div class="count">${cat.count} articles</div></div>`;
      }

      const posts = BLOG.posts.filter(p => p.category === catSlug);
      document.getElementById('catPostGrid').innerHTML = posts.length
        ? posts.map(p => postCardHTML(p)).join('')
        : '<p style="color:var(--color-text-secondary);padding:40px 0">No articles in this category yet.</p>';

      document.getElementById('allCats').innerHTML = BLOG.categories.map(c => `
        <a href="category.html?cat=${c.slug}" style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--color-border-light);font-size:14px;color:${c.slug===catSlug?'var(--color-accent)':'var(--color-text-body)'}">
          <span>${c.name}</span><span style="font-size:12px;color:var(--color-text-muted)">${c.count}</span>
        </a>
      `).join('');
    });
  </script>
</body>
</html>
