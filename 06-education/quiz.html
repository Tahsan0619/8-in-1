<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — LearnHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="quiz-page">

  <!-- Quiz Header -->
  <div class="quiz-header">
    <div class="quiz-header-inner">
      <a href="index.html" class="logo logo-sm">
        <svg viewBox="0 0 32 32" fill="none" width="24" height="24"><rect width="32" height="32" rx="8" fill="#7C3AED"/><path d="M8 22V10l8 6-8 6z" fill="#fff"/><path d="M16 22V10l8 6-8 6z" fill="#fff" opacity=".5"/></svg>
      </a>
      <h3 class="quiz-title" id="quiz-title"></h3>
      <div class="quiz-timer" id="quiz-timer">
        <span class="timer-icon">⏱️</span>
        <span class="timer-text" id="timer-text">15:00</span>
      </div>
    </div>
  </div>

  <!-- Quiz Progress -->
  <div class="quiz-progress" id="quiz-progress"></div>

  <!-- Quiz Body -->
  <div class="quiz-body">
    <div class="quiz-container">
      <!-- Question Card -->
      <div class="quiz-card" id="quiz-card"></div>

      <!-- Navigation -->
      <div class="quiz-nav">
        <button class="btn btn-outline" id="quiz-prev" disabled>← Previous</button>
        <button class="btn btn-primary" id="quiz-next">Next →</button>
        <button class="btn btn-primary quiz-submit-btn" id="quiz-submit" style="display:none">Submit Quiz</button>
      </div>
    </div>
  </div>

  <!-- Results Screen -->
  <div class="quiz-results" id="quiz-results" style="display:none">
    <div class="quiz-container">
      <div class="results-card">
        <div class="results-score-circle" id="results-score-circle">
          <svg viewBox="0 0 120 120">
            <circle cx="60" cy="60" r="54" fill="none" stroke="var(--border)" stroke-width="8"/>
            <circle cx="60" cy="60" r="54" fill="none" stroke="var(--accent)" stroke-width="8"
                    stroke-dasharray="339.3" stroke-dashoffset="339.3" stroke-linecap="round"
                    transform="rotate(-90 60 60)" id="score-circle-fill"/>
          </svg>
          <div class="score-value" id="score-value">0%</div>
        </div>
        <h2 id="results-grade"></h2>
        <p id="results-message"></p>
        <div class="results-stats" id="results-stats"></div>
        <div class="results-actions">
          <button class="btn btn-outline" id="review-quiz-btn">Review Answers</button>
          <a href="dashboard.html" class="btn btn-primary">Back to Dashboard</a>
        </div>
      </div>
      <div class="review-section" id="review-section" style="display:none"></div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
