<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photography — Tahsan Islam</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/data.js" defer></script>
  <script src="js/app.js" defer></script>
</head>
<body>
  <div class="cursor-dot"></div><div class="cursor-ring"></div>
  <header class="header solid"><div class="header-inner">
    <button class="menu-toggle" onclick="MobileMenu.open()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg></button>
    <a href="index.html" class="header-logo">Tahsan.</a>
    <nav class="header-nav"><a href="index.html">Home</a><a href="work.html">Work</a><a href="photography.html" class="active">Photography</a><a href="contact.html">Contact</a></nav>
    <div class="header-actions"><button class="theme-btn" onclick="Theme.toggle()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button></div>
  </div></header>
  <div class="mobile-overlay" id="mobileOverlay" onclick="MobileMenu.close()"></div>
  <aside class="mobile-menu" id="mobileMenu"><div class="mobile-menu-header"><span class="header-logo">Tahsan.</span><button onclick="MobileMenu.close()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button></div><nav class="mobile-menu-nav"><a href="index.html">Home</a><a href="work.html">Work</a><a href="photography.html">Photography</a><a href="contact.html">Contact</a></nav></aside>

  <div class="page-header">
    <h1>Photography</h1>
    <p>Stories captured through the lens.</p>
  </div>

  <main class="container" style="padding-bottom:120px">
    <!-- Albums -->
    <span class="section-label">Albums</span>
    <div class="album-grid" id="albumGrid" style="margin-bottom:64px"></div>

    <!-- Gallery Filter -->
    <div class="filter-bar" id="photoFilter" style="margin-top:32px"></div>
    <div class="masonry" id="masonry"></div>
  </main>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" onclick="Lightbox.close()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="28" height="28"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
    <span class="lightbox-counter" id="lightboxCounter"></span>
    <button class="lightbox-nav lightbox-prev" onclick="Lightbox.prev()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><path d="m15 18-6-6 6-6"/></svg></button>
    <img id="lightboxImg" alt="">
    <button class="lightbox-nav lightbox-next" onclick="Lightbox.next()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><path d="m9 18 6-6-6-6"/></svg></button>
  </div>

  <footer class="footer"><div class="container"><p>&copy; 2025 Tahsan Islam · Built with ☕</p></div></footer>
  <button class="scroll-top"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="m18 15-6-6-6 6"/></svg></button>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const photo = PORTFOLIO.photography;
      let activeAlbum = 'all';

      // Albums
      document.getElementById('albumGrid').innerHTML = photo.albums.map(a => `
        <div class="album-card" onclick="filterAlbum('${a.id}')">
          <img src="${a.cover}" alt="${a.name}" loading="lazy">
          <div class="album-card-overlay"><div><h3>${a.name}</h3><span>${a.count} photos</span></div></div>
        </div>
      `).join('');

      // Filter
      const cats = ['all', ...photo.albums.map(a => a.id)];
      document.getElementById('photoFilter').innerHTML = cats.map((c, i) => `<button class="filter-pill ${i===0?'active':''}" onclick="filterPhotos('${c}',this)">${c.charAt(0).toUpperCase()+c.slice(1)}</button>`).join('');

      renderPhotos('all');

      window.filterPhotos = function(album, btn) {
        activeAlbum = album;
        document.querySelectorAll('#photoFilter .filter-pill').forEach(p => p.classList.remove('active'));
        if (btn) btn.classList.add('active');
        renderPhotos(album);
      };

      window.filterAlbum = function(album) {
        activeAlbum = album;
        document.querySelectorAll('#photoFilter .filter-pill').forEach(p => {
          p.classList.toggle('active', p.textContent.toLowerCase() === album);
        });
        renderPhotos(album);
        document.getElementById('photoFilter').scrollIntoView({ behavior: 'smooth', block: 'start' });
      };

      function renderPhotos(album) {
        const filtered = album === 'all' ? photo.photos : photo.photos.filter(p => p.album === album);
        const allSrcs = filtered.map(p => p.src);
        document.getElementById('masonry').innerHTML = filtered.map((p, i) => `
          <div class="masonry-item" onclick="Lightbox.open(${JSON.stringify(allSrcs).replace(/"/g,"'")},${i})">
            <img src="${p.src}" alt="${p.caption}" loading="lazy">
            <div class="masonry-hover"><span>${p.caption} · ${p.location}</span></div>
          </div>
        `).join('');
      }
    });
  </script>
</body>
</html>
