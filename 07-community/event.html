<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Detail — CommunityHub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo">🔥 CommunityHub</a>
      <nav class="nav">
        <a href="index.html">Feed</a><a href="jobs.html">Jobs</a><a href="forum.html">Forum</a>
        <a href="directory.html">Directory</a><a href="events.html" class="active">Events</a><a href="reviews.html">Reviews</a>
      </nav>
      <div class="header-actions">
        <button class="theme-toggle">🌙</button>
        <button onclick="document.querySelector('.search-overlay').classList.add('active')">🔍</button>
        <div class="notif-btn" style="position:relative"><button>🔔</button><span class="notif-badge">3</span><div class="notif-dropdown"><div class="notif-dropdown-header"><span>Notifications</span></div><div class="notif-list"></div></div></div>
        <div class="user-menu"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=tahsan" alt=""><span>Tahsan</span></div>
      </div>
      <button class="menu-toggle"><span></span></button>
    </div>
  </header>

  <div class="search-overlay"><div class="search-modal"><div class="search-modal-input"><span>🔍</span><input type="text" placeholder="Search..."><button class="close-search">ESC</button></div><div class="search-results-body"></div></div></div>

  <div class="event-hero" id="event-hero"></div>

  <div class="container" style="margin-top:32px">
    <a href="events.html" style="font-size:14px;color:var(--accent);display:inline-block;margin-bottom:16px">← Back to Events</a>
    <div class="event-detail-layout">
      <div id="event-detail-content"></div>
      <div class="ticket-sidebar" id="event-ticket-sidebar"></div>
    </div>
  </div>

  <nav class="bottom-nav"><div class="bottom-nav-inner">
    <a href="index.html" class="bottom-nav-item"><span>🏠</span><span>Home</span></a>
    <a href="jobs.html" class="bottom-nav-item"><span>💼</span><span>Jobs</span></a>
    <a href="forum.html" class="bottom-nav-item"><span>💬</span><span>Forum</span></a>
    <a href="events.html" class="bottom-nav-item active"><span>🎤</span><span>Events</span></a>
    <a href="profile.html" class="bottom-nav-item"><span>👤</span><span>Me</span></a>
  </div></nav>

  <button class="scroll-top">↑</button>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
