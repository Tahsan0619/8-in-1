<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Provider Dashboard — BookIt</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="header-logo">Book<span>It</span></a>
      <nav class="header-nav">
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="restaurant.html">Restaurant</a>
        <a href="clinic.html">Clinic</a>
        <a href="dashboard.html">My Bookings</a>
      </nav>
      <div class="header-actions">
        <button class="theme-btn" aria-label="Toggle theme"></button>
        <button class="menu-toggle" aria-label="Menu">
          <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- MOBILE MENU -->
  <div class="mobile-overlay"></div>
  <div class="mobile-menu">
    <div class="mobile-menu-header">
      <span class="header-logo">Book<span>It</span></span>
      <button class="mobile-menu-close"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <nav class="mobile-menu-nav">
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="restaurant.html">Restaurant</a>
      <a href="clinic.html">Clinic</a>
      <a href="dashboard.html">My Bookings</a>
      <a href="provider.html" class="active">Provider Dashboard</a>
    </nav>
  </div>

  <!-- PROVIDER DASHBOARD -->
  <section class="section">
    <div class="container">
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:32px">
        <img src="https://images.unsplash.com/photo-1580489944761-15a19d654956?w=64&h=64&fit=crop" alt="Maya Chen" style="width:56px;height:56px;border-radius:50%;object-fit:cover">
        <div>
          <h1 style="font-size:24px;margin-bottom:2px">Welcome back, Maya</h1>
          <p style="color:var(--color-text-secondary);font-size:14px">Serenity Day Spa — Provider Dashboard</p>
        </div>
      </div>

      <!-- KPIs -->
      <div class="kpi-grid"></div>

      <div style="display:grid;grid-template-columns:1.5fr 1fr;gap:40px;align-items:start">
        <div>
          <!-- Today's Schedule -->
          <h2 style="font-size:20px;margin-bottom:16px">Today's Schedule</h2>
          <div id="providerTimeline"></div>
        </div>

        <div>
          <!-- Availability -->
          <h2 style="font-size:20px;margin-bottom:16px">Weekly Availability</h2>
          <div id="providerAvail"></div>
        </div>
      </div>

      <!-- Earnings -->
      <div style="margin-top:40px">
        <h2 style="font-size:20px;margin-bottom:16px">Monthly Earnings</h2>
        <div style="background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:24px">
          <div id="earningsChart"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">© 2025 BookIt. All rights reserved.</div>
    </div>
  </footer>

  <button class="scroll-top" aria-label="Scroll to top">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
